<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>authentification page</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class= "bg-[url('images/image1.jpg')] bg-no-repeat bg-cover h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded shadow w-80">

        <h2 class="text-2xl font-bold mb-4 text-center justify-center">Login / Signup</h2>
        <input id="email" type="email" placeholder="Email" class="border p-2 w-full mb-3">
        <input id="password" type="password" placeholder="Password" class="border p-2 w-full mb-3">

        <button id="loginbtn" class="bg-blue-500 hover:bg-blue-600 text-white w-full py-2 mb-2">Login</button>
        <button id="signupbtn" class="bg-blue-600 hover:bg-blue-700 text-white w-full py-2">Sign Up</button>

    </div>
<script src="script.js"></script> 
</body>
</html>
